version: '3.8'

services:
  bible-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bible-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - BIBLE_API_PORT=3001
    volumes:
      # Mount db folder as read-only if you want to persist external databases
      # - ./db:/app/db:ro
      - /app/node_modules
    networks:
      - bible-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  bible-network:
    driver: bridge
